services:
  postgres:
    image: postgres:15-alpine
    container_name: spendwise-postgres
    environment:
      POSTGRES_USER: spendwise
      POSTGRES_PASSWORD: spendwise
      POSTGRES_DB: spendwise
    ports:
      - "5432:5432"
    volumes:
      - spendwise_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendwise -d spendwise"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  spendwise_pgdata:
